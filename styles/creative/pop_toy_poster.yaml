prompt: |
  竖版潮玩 IP 海报，3D 哑光潮玩手办风格，C4D 写实渲染，磨砂哑光材质质感，浅灰色干净背景。
  画面主体是上半身的方块头男性潮玩人偶，灰绿色拼色短发，面部线条硬朗神情严肃，耳朵佩戴耳钉；
  身穿深灰色西装外套，内搭荧光亮绿色衬衫，系灰黑条纹领带，
  西装上点缀多款金属徽章，胸口有圆形表情徽章、三角标识徽章与圆形徽章。
  人偶右手抬起整理领带，手腕佩戴黑色智能手表，表盘印有生物危害标志，手背有手写签名纹身；
  左手持雪茄，姿态酷感十足。
  背景与文字装饰：背景衬有半透明灰色大号字母底纹；
  顶部是荧光绿色粗体英文，其上叠加黑色飘逸手写涂鸦字体；
  左侧竖排标注设计署名；右侧排布竖版条形码与数字编号；
  左下角是黑底荧光绿的品牌 logo。
  整体以深灰、哑光白、荧光绿为主色调，潮酷街头氛围强烈，材质质感细腻真实，高清 8K，潮玩产品级渲染质量。
  不要水印，不要真实Logo，不要电商广告感。

