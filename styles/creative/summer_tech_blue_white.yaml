prompt: |
  一个设计感十足的作品集宣传海报，以科技蓝白色为背景，突出"科技元素设计"的主题。
  画面中心是一个由各种设计元素构成的"清凉夏季"LOGO，每个logo的组成部分都充满了创意，
  包含西瓜，冰饮料，沙滩，草帽，茅草屋，躺椅，水果，冰块和各种奇特的场景。
  整体风格充满未来感和创造力，色彩鲜艳，构图复杂，给人一种热闹、充满活力的感觉。
  Octane渲染，64K高清画质，画面中下方：用流动的毛笔手绘字体：
  "Don't wait for inspiration"（纤细的笔画，笔画拉丝，灵动的曲线，有质感），
  极小的装饰性小字，极细无衬线小字体"2026"，
  质感，肌理感，艺术抽象，诗意的，高级，杰作，
  极具视觉冲击力，获奖作品，大师级配色，大师级排版，高细节，高级感，超高清，布局协调。

