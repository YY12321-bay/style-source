# .github/workflows/manual-deploy.yml
name: 手动部署 gallery

on:
  workflow_dispatch:
    inputs:
      reason:
        description: '部署原因'
        required: true
        default: '日常更新'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 生成最新数据
        run: python3 scripts/generate_data.py

      - name: 构建 gallery.html（内联 CSS/JS）
        run: python3 scripts/build_gallery.py

      - name: 提交到仓库并触发 Pages
        run: |
          git config user.name "style-source-bot"
          git config user.email "bot@style-source"
          git add data/ gallery.html gallery/src/
          git diff --cached --quiet || git commit -m "chore: manual deploy gallery [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
