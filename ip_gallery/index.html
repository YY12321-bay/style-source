<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP 图库</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f2f5;
  color: #1f2937;
  min-height: 100vh;
}
header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 40px 20px;
  text-align: center;
}
header h1 { font-size: 2em; margin-bottom: 8px; }
header p { opacity: 0.85; font-size: 1.1em; }
header .count { 
  display: inline-block; 
  background: rgba(255,255,255,0.2); 
  padding: 4px 16px; 
  border-radius: 20px; 
  margin-top: 12px;
  font-size: 0.9em;
}
.container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

/* IP卡片网格 */
.ip-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}
.ip-card {
  background: white;
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
}
.ip-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
}
.ip-card .img-wrap {
  width: 100%;
  aspect-ratio: 1;
  background: #f5f5f5;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border-radius: 16px 16px 0 0;
}
.ip-card .img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.ip-card .info {
  padding: 16px;
}
.ip-card .info h3 {
  font-size: 1.1em;
  margin-bottom: 4px;
}
.ip-card .info .brand {
  color: #667eea;
  font-size: 0.85em;
  font-weight: 600;
}
.ip-card .info .scene-tag {
  display: inline-block;
  background: #f0fdf4;
  color: #16a34a;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 0.8em;
  margin-top: 4px;
}
.ip-card .info .style-tag {
  display: inline-block;
  background: #eef2ff;
  color: #4f46e5;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 0.8em;
  margin-top: 6px;
}
.ip-card .info .btn-sheji {
  display: inline-block;
  margin-top: 8px;
  padding: 4px 14px;
  background: #fef3c7;
  color: #d97706;
  border-radius: 20px;
  font-size: 0.8em;
  font-weight: 600;
  text-decoration: none;
  transition: background 0.2s;
  border: none;
  cursor: pointer;
}
.ip-card .info .btn-sheji:hover {
  background: #fde68a;
}
.ip-card .info .btn-copy-link {
  display: inline-block;
  margin-left: 4px;
  margin-top: 8px;
  padding: 4px 14px;
  background: #e0e7ff;
  color: #4f46e5;
  border-radius: 20px;
  font-size: 0.8em;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: background 0.2s;
}
.ip-card .info .btn-copy-link:hover {
  background: #c7d2fe;
}
.ip-card .info .btn-copy-dropdown {
  position: relative;
  display: inline-block;
  margin-left: 4px;
  margin-top: 8px;
}
.ip-card .info .btn-copy-dropdown > button {
  padding: 4px 14px;
  background: #e0e7ff;
  color: #4f46e5;
  border-radius: 20px;
  font-size: 0.8em;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: background 0.2s;
}
.ip-card .info .btn-copy-dropdown > button:hover {
  background: #c7d2fe;
}
.ip-card .info .btn-copy-dropdown .dropdown-menu {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background: white;
  border-radius: 10px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  z-index: 10;
  min-width: 180px;
  padding: 4px 0;
  margin-top: 4px;
}
.ip-card .info .btn-copy-dropdown .dropdown-menu.show {
  display: block;
}
.ip-card .info .btn-copy-dropdown .dropdown-menu button {
  display: block;
  width: 100%;
  padding: 8px 16px;
  border: none;
  background: none;
  text-align: left;
  font-size: 0.85em;
  cursor: pointer;
  color: #1f2937;
  transition: background 0.15s;
}
.ip-card .info .btn-copy-dropdown .dropdown-menu button:hover {
  background: #f3f4f6;
}
.ip-card .info .btn-copy-dropdown .dropdown-menu button .hint {
  color: #9ca3af;
  font-size: 0.8em;
  display: block;
}

/* 图片链接复制提示 */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: #1f2937;
  color: white;
  padding: 10px 24px;
  border-radius: 12px;
  font-size: 0.9em;
  z-index: 2000;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* Lightbox */
.lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 999;
  justify-content: center;
  align-items: center;
}
.lightbox.active { display: flex; }
.lightbox-content {
  max-width: 90vw;
  max-height: 90vh;
  position: relative;
}
.lightbox-content img {
  max-width: 100%;
  max-height: 85vh;
  border-radius: 12px;
  box-shadow: 0 4px 30px rgba(0,0,0,0.3);
}
.lightbox .close {
  position: absolute;
  top: -40px;
  right: 0;
  color: white;
  font-size: 30px;
  cursor: pointer;
  opacity: 0.8;
}
.lightbox .close:hover { opacity: 1; }

/* 角色设定 Modal */
.sheji-modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.sheji-modal.active { display: flex; }
.sheji-modal-content {
  background: white;
  border-radius: 16px;
  max-width: 800px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 32px;
  position: relative;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}
.sheji-modal-content .close-btn {
  position: absolute;
  top: 16px;
  right: 20px;
  font-size: 28px;
  cursor: pointer;
  color: #9ca3af;
  background: none;
  border: none;
}
.sheji-modal-content .close-btn:hover { color: #374151; }
.sheji-modal-content h1 { font-size: 1.6em; margin-bottom: 12px; }
.sheji-modal-content h2 { 
  font-size: 1.2em; margin: 20px 0 10px; 
  padding-bottom: 6px;
  border-bottom: 2px solid #f0f2f5;
}
.sheji-modal-content h3 { font-size: 1em; margin: 14px 0 6px; color: #4b5563; }
.sheji-modal-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 0.9em;
}
.sheji-modal-content td, .sheji-modal-content th {
  border: 1px solid #e5e7eb;
  padding: 8px 12px;
  text-align: left;
}
.sheji-modal-content td:first-child {
  font-weight: 600;
  background: #f9fafb;
  white-space: nowrap;
  width: 100px;
}
.sheji-modal-content ul { padding-left: 20px; margin: 8px 0; }
.sheji-modal-content li { margin: 4px 0; line-height: 1.6; }
.sheji-modal-content p { line-height: 1.8; margin: 8px 0; }
.sheji-modal-content code {
  background: #f3f4f6;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.9em;
}
.sheji-modal-content pre {
  background: #1f2937;
  color: #f9fafb;
  padding: 16px;
  border-radius: 8px;
  overflow-x: auto;
  font-size: 0.85em;
  margin: 12px 0;
}

/* 空状态 */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: #9ca3af;
}
.empty-state .icon { font-size: 64px; margin-bottom: 16px; }
.empty-state h3 { font-size: 1.3em; margin-bottom: 8px; color: #6b7280; }
.empty-state p { font-size: 0.95em; }

/* 页脚 */
footer {
  text-align: center;
  padding: 30px 20px;
  color: #9ca3af;
  font-size: 0.85em;
}
footer a { color: #667eea; text-decoration: none; }
</style>
</head>
<body>
<header>
  <h1>🎭 IP 图库</h1>
  <p>本地IP角色参考图，用于AI绘画生图</p>
  <div class="count" id="countTotal">加载中...</div>
</header>

<div class="container">
  <div class="ip-grid" id="ipGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="icon">📭</div>
    <h3>还没有IP</h3>
    <p>将IP图片放入桌面 <code>ip_library/</code> 目录，运行同步脚本即可显示</p>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-content">
    <span class="close">&times;</span>
    <img id="lightboxImg" src="" alt="">
    <div style="text-align:center;margin-top:12px;display:flex;gap:8px;justify-content:center">
      <button class="btn-copy-link" id="lightboxCopySquare" onclick="copyLightboxUrl('square')">🔗 复制方形图 (API用)</button>
      <button class="btn-copy-link" id="lightboxCopyRef" onclick="copyLightboxUrl('reference')">🔗 复制原图 (高清)</button>
    </div>
  </div>
</div>

<!-- Toast 提示 -->
<div class="toast" id="toast">✅ 已复制到剪贴板</div>

<!-- 角色设定 Modal -->
<div class="sheji-modal" id="shejiModal">
  <div class="sheji-modal-content">
    <button class="close-btn" onclick="closeSheji()">&times;</button>
    <div id="shejiContent"></div>
  </div>
</div>

<footer>
  <a href="https://yy12321-bay.github.io/style-source/gallery.html">🎨 风格画廊</a> · 
  <a href="https://github.com/YY12321-bay/style-source">GitHub</a>
</footer>

<script>
const BASE_URL = 'https://yy12321-bay.github.io/style-source';
const IP_GALLERY_URL = BASE_URL + '/ip_gallery';

async function loadIPs() {
  try {
    const resp = await fetch('../data/ip_library.json?t=' + Date.now());
    const data = await resp.json();
    const grid = document.getElementById('ipGrid');
    const count = document.getElementById('countTotal');
    
    if (!data.ips || data.ips.length === 0) {
      document.getElementById('emptyState').style.display = 'block';
      count.textContent = '0 个IP';
      return;
    }
    
    count.textContent = data.total + ' 个IP';
    
    data.ips.forEach(ip => {
      const card = document.createElement('div');
      card.className = 'ip-card';
      card.innerHTML = `
        <div class="img-wrap">
          <img src="../${ip.thumb}" alt="${ip.name}" loading="lazy">
        </div>
        <div class="info">
          <h3>${ip.name}</h3>
          <div class="brand">${ip.brand}</div>
          <div class="scene-tag">${ip.scene}</div>
          <span class="style-tag">${ip.style}</span>
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">
            ${ip.has_sheji ? `<button class="btn-sheji" onclick="event.stopPropagation(); openSheji('${ip.id}')">📋 角色设定</button>` : ''}
            <div class="btn-copy-dropdown" onclick="event.stopPropagation()">
              <button onclick="toggleDropdown(this)">🔗 复制链接 ▾</button>
              <div class="dropdown-menu">
                <button onclick="copyImgLink('${ip.square}', '${ip.name}', 'square'); closeDropdown(this)">
                  方形图 (800×800)
                  <span class="hint">API传参用</span>
                </button>
                <button onclick="copyImgLink('${ip.reference}', '${ip.name}', 'reference'); closeDropdown(this)">
                  原图 (1200px)
                  <span class="hint">高清参考</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
      card.addEventListener('click', () => openLightbox('../' + ip.square, ip.name));
      grid.appendChild(card);
    });
  } catch(e) {
    document.getElementById('countTotal').textContent = '加载失败';
    console.warn('IP图库加载失败', e);
  }
}

function openLightbox(src, name) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  img.src = src;
  img.alt = name;
  img.dataset.ipName = name;
  lb.classList.add('active');
}

function copyLightboxUrl(type) {
  const name = document.getElementById('lightboxImg').dataset.ipName;
  if (!name) return;
  const files = { 'square': 'square.jpg', 'reference': 'reference.jpg' };
  const labels = { 'square': '方形图', 'reference': '原图' };
  const path = 'ip_gallery/' + encodeURIComponent(name) + '/' + files[type];
  const url = BASE_URL + '/' + path;
  copyToClipboard(url, labels[type] + ' 链接已复制');
}

function copyImgLink(imgPath, name, type) {
  const url = BASE_URL + '/' + imgPath;
  const labels = { 'square': '方形图', 'reference': '原图' };
  const label = labels[type] || '图片';
  copyToClipboard(url, label + ' 链接已复制');
}

function toggleDropdown(btn) {
  const menu = btn.nextElementSibling;
  // 关闭其他dropdown
  document.querySelectorAll('.dropdown-menu.show').forEach(m => {
    if (m !== menu) m.classList.remove('show');
  });
  menu.classList.toggle('show');
}

function closeDropdown(btn) {
  btn.closest('.dropdown-menu').classList.remove('show');
}

function copyToClipboard(text, msg) {
  const displayMsg = msg || '已复制到剪贴板';
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.textContent = '✅ ' + displayMsg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const toast = document.getElementById('toast');
    toast.textContent = '✅ ' + displayMsg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

// 角色设定
function openSheji(id) {
  const modal = document.getElementById('shejiModal');
  const content = document.getElementById('shejiContent');
  content.innerHTML = '<div style="text-align:center;padding:40px;color:#9ca3af">⏳ 加载中...</div>';
  modal.classList.add('active');
  
  fetch(`../ip_gallery/${id}/设定集.md?t=${Date.now()}`)
    .then(r => {
      if (!r.ok) throw new Error('Not found');
      return r.text();
    })
    .then(md => {
      // 简单渲染 Markdown
      content.innerHTML = renderSheji(md);
    })
    .catch(e => {
      content.innerHTML = '<div style="text-align:center;padding:40px;color:#ef4444">❌ 加载失败</div>';
    });
}

function closeSheji() {
  document.getElementById('shejiModal').classList.remove('active');
}

function renderSheji(md) {
  // 简易 Markdown → HTML
  let html = md
    // 标题
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // 表格
    .replace(/\|(.+)\|/g, (m) => {
      if (m.includes('---')) return '';
      const cells = m.split('|').filter(c => c.trim()).map(c => c.trim());
      return '<tr><td>' + cells.join('</td><td>') + '</td></tr>';
    })
    .replace(/<tr><tr>/g, '<tr>')
    .replace(/<\/tr><\/tr>/g, '</tr>')
    // 列表
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
    // 代码块
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // 加粗
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // 换行
    .replace(/\n\n/g, '<br>')
    .replace(/\n/g, '<br>')
    // 包裹表格
    .replace(/((?:<tr>.*<\/tr>\n?)+)/g, '<table>$1</table>')
    // 包裹列表
    .replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  
  return html;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLightbox(); closeSheji(); }
});

// 点击外部关闭设定 Modal
document.getElementById('shejiModal')?.addEventListener('click', e => {
  if (e.target === e.currentTarget) closeSheji();
});

loadIPs();
</script>
</body>
</html>
